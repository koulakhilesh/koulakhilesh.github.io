# Site
title: "Akhilesh Koul"
tagline: "Tech, trails & tales."
description: "Akhilesh Koul — data scientist, maker, and writer. Projects, writing, and DIY."
url: "https://koulakhilesh.github.io"
baseurl: ""
lang: en-US
author:
  name: "Akhilesh Koul"
  role: "Data Scientist · Maker · London"
  email: "koulakhilesh@gmail.com"
  github: "koulakhilesh"
  linkedin: ""   # add handle when ready

# Build
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge
permalink: /writing/:title/
sass:
  style: compressed
  sass_dir: _sass
timezone: Europe/London

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  making:
    output: true
    permalink: /making/:name/

# Defaults
defaults:
  - scope: { path: "", type: "posts" }
    values: { layout: "post" }
  - scope: { path: "", type: "projects" }
    values: { layout: "project" }
  - scope: { path: "", type: "making" }
    values: { layout: "making" }

# Homepage tuning
home:
  featured_posts: 3
  featured_projects: 2
  making_preview: 4

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - package.json
  - vendor
  - .superpowers
  - docs
  - _templates