---
layout: default
---
<article class="wrap post-single">
  <p class="mono">Project{% for s in page.stack %} · {{ s }}{% endfor %}</p>
  <h1 class="post-title">{{ page.title }}</h1>
  {% if page.links.repo or page.links.demo %}
  <p class="proj-links">
    {% if page.links.repo %}<a class="btn btn-ghost" href="{{ page.links.repo }}">Code</a>{% endif %}
    {% if page.links.demo %}<a class="btn btn-primary" href="{{ page.links.demo }}">Live</a>{% endif %}
  </p>{% endif %}
  <div class="prose">{{ content }}</div>
  <p class="post-back"><a href="{{ '/projects/' | relative_url }}">← all projects</a></p>
</article>
