<a class="proj" href="{{ include.project.url | relative_url }}">
  {% if include.project.cover %}<div class="proj-cover"><img src="{{ include.project.cover | relative_url }}" alt="{{ include.project.title }}" loading="lazy"></div>{% endif %}
  <div class="proj-head">
    <h3>{{ include.project.title }}</h3>
    {% if include.project.status %}<span class="status status--{{ include.project.status | slugify }}">{{ include.project.status }}</span>{% endif %}
  </div>
  <p>{{ include.project.summary }}</p>
  <div class="proj-foot">
    <div class="stack">{% for s in include.project.stack %}<span class="pill">{{ s }}</span>{% endfor %}</div>
    {% if include.project.year %}<span class="proj-year mono">{{ include.project.year }}</span>{% endif %}
  </div>
</a>
